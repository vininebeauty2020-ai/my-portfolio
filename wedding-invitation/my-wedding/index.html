<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Tozzi Studio | Premium Invitation</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400&family=Noto+Serif+KR:wght@300;400;600&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/remixicon@3.5.0/fonts/remixicon.css" rel="stylesheet">

    <style>
        /* === [기본 설정] === */
        :root { --main-bg: #FAF9F6; --text-color: #2c2c2c; --point-color: #8b8378; }
        body { margin: 0; background-color: #111; color: var(--text-color); font-family: 'Noto Serif KR', serif; overflow-x: hidden; }
        .wrap { max-width: 500px; margin: 0 auto; background: var(--main-bg); position: relative; box-shadow: 0 0 30px rgba(0,0,0,0.5); padding-bottom: 80px; }
        section { padding: 90px 20px; text-align: center; position: relative; }
        h2 { font-family: 'Cormorant Garamond', serif; font-size: 1.6rem; letter-spacing: 0.1em; color: var(--point-color); margin-bottom: 40px; font-weight: 400; text-transform: uppercase; }
        p { font-size: 0.95rem; line-height: 2.2; font-weight: 300; color: #555; }
        
        .fade-up { opacity: 0; transform: translateY(40px); }

        /* === [BGM 버튼 (우측 상단 고정)] === */
        .bgm-btn { position: fixed; top: 20px; right: 20px; width: 45px; height: 45px; background: rgba(255,255,255,0.8); backdrop-filter: blur(5px); border-radius: 50%; display: flex; justify-content: center; align-items: center; font-size: 1.2rem; color: var(--point-color); z-index: 9000; cursor: pointer; box-shadow: 0 4px 10px rgba(0,0,0,0.1); transition: 0.3s; }
        .spin { animation: spin 4s linear infinite; }
        @keyframes spin { 100% { transform: rotate(360deg); } }

        /* === [메인 포스터] === */
        .hero { height: 100vh; padding: 0; display: flex; flex-direction: column; justify-content: center; align-items: center; position: relative; overflow: hidden; }
        .hero-text { position: relative; z-index: 10; color: #fff; text-shadow: 0 2px 15px rgba(0,0,0,0.3); margin-top: 50vh; }
        .hero h1 { font-size: 2.2rem; margin: 5px 0; font-weight: 400; letter-spacing: 5px; }

        /* === [하이엔드 갤러리 (가로 스크롤)] === */
        .gallery-wrap { overflow: hidden; padding: 0; background: #111; color: #fff; height: 100vh; display: flex; flex-direction: column; justify-content: center; }
        .gallery-wrap h2 { color: #fff; margin-bottom: 20px; }
        .gallery-scroll { display: flex; width: max-content; padding-left: 20px; padding-right: 20px; gap: 20px; }
        .gallery-item { width: 300px; height: 450px; flex-shrink: 0; overflow: hidden; border-radius: 4px; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }

        /* === [RSVP 플로팅 버튼 (하단 고정)] === */
        .floating-rsvp { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%); width: 90%; max-width: 450px; padding: 18px; background: var(--text-color); color: #fff; border: none; font-size: 1rem; letter-spacing: 2px; cursor: pointer; z-index: 9000; border-radius: 30px; box-shadow: 0 10px 20px rgba(0,0,0,0.2); font-family: 'Cormorant Garamond', serif; font-weight: 600; text-transform: uppercase; }

        /* === [모달 팝업] === */
        .modal-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); backdrop-filter: blur(5px); z-index: 9999; display: none; opacity: 0; transition: opacity 0.4s; justify-content: center; align-items: center; }
        .modal-content { background: var(--main-bg); width: 90%; max-width: 400px; padding: 40px 20px; position: relative; border-radius: 8px; box-sizing: border-box; }
        .btn-close { position: absolute; top: 15px; right: 15px; background: none; border: none; font-size: 2rem; cursor: pointer; color: #999; }
        
        input, select, textarea { width: 100%; box-sizing: border-box; padding: 15px; margin-bottom: 15px; border: 1px solid #ddd; border-radius: 4px; font-family: inherit; background: #fff; }
        textarea { height: 100px; resize: none; }
        .btn-submit { width: 100%; padding: 18px; background: var(--point-color); color: #fff; border: none; font-size: 1rem; cursor: pointer; letter-spacing: 1px; }
    </style>
</head>
<body>

<audio id="bgm" src="./img/bgm.mp3" loop></audio>

<div class="bgm-btn" id="bgm-btn" onclick="toggleBGM()">
    <i class="ri-music-2-line"></i>
</div>

<div class="wrap">
    <section class="hero">
        <img src="./img/main.jpg" style="position:absolute; top:0; left:0; width:100%; height:100%; object-fit:cover; filter:brightness(0.75); z-index:0;" alt="메인 사진">
        <div class="hero-text fade-up">
            <h1 style="font-family: 'Cormorant Garamond', serif;">MINJUN & SONGI</h1>
            <p style="font-weight:300; font-size:1rem;">2026. 10. 24. SAT PM 12:00</p>
        </div>
    </section>

    <section id="intro">
        <h2 class="fade-up">Invitation</h2>
        <p class="fade-up">
            두 사람이 만나 하나의 길을 걷고자 합니다.<br>
            그 시작의 자리에 소중한 분들을 모십니다.<br>
            바쁘시더라도 참석해 주셔서<br>
            저희의 앞날을 축복해 주시면 감사하겠습니다.
        </p>
    </section>

    <div class="gallery-wrap" id="gallery-pin">
        <h2 style="text-align:center;">Gallery</h2>
        <div class="gallery-scroll" id="gallery-scroll">
            <div class="gallery-item"><img src="./img/1.jpg" alt="사진1"></div>
            <div class="gallery-item"><img src="./img/2.jpg" alt="사진2"></div>
            <div class="gallery-item"><img src="./img/3.jpg" alt="사진3"></div>
            <div class="gallery-item"><img src="./img/4.jpg" alt="사진4"></div>
            <div class="gallery-item"><img src="./img/5.jpg" alt="사진5"></div>
            <div class="gallery-item"><img src="./img/6.jpg" alt="사진6"></div>
            </div>
        <p style="text-align:center; color:#666; font-size:0.8rem; margin-top:20px;">스크롤하여 사진을 확인하세요 &rarr;</p>
    </div>

    <section style="height: 50vh; display:flex; align-items:center; justify-content:center;">
        <h2 class="fade-up" style="margin:0;">See You Soon.</h2>
    </section>

</div> <button class="floating-rsvp" onclick="openRSVPModal()">R.S.V.P 작성하기</button>

<div class="modal-overlay" id="rsvpModal">
    <div class="modal-content">
        <button class="btn-close" onclick="closeRSVPModal()">&times;</button>
        <h2 style="margin-top:0; color:var(--point-color);">R.S.V.P</h2>
        <form id="gform">
            <input type="text" name="name" placeholder="성함" required>
            <select name="attendance" required>
                <option value="" disabled selected>참석 여부 선택</option>
                <option value="참석 (식사함)">참석 (식사함)</option>
                <option value="참석 (식사안함)">참석 (식사안함)</option>
                <option value="마음으로 축하">마음으로 축하</option>
            </select>
            <textarea name="message" placeholder="축하의 메시지를 남겨주세요"></textarea>
            <button type="submit" class="btn-submit">메시지 남기기</button>
        </form>
    </div>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>

<script>
    // 1. 에르메스풍 스크롤 등장 애니메이션
    gsap.registerPlugin(ScrollTrigger);
    gsap.utils.toArray('.fade-up').forEach(element => {
        gsap.to(element, {
            scrollTrigger: { trigger: element, start: "top 85%" },
            opacity: 1, y: 0, duration: 1.2, ease: "power2.out"
        });
    });

    // 2. ★ 트렌디 가로 스크롤 애니메이션 (갤러리) ★
    const galleryScroll = document.getElementById("gallery-scroll");
    const galleryPin = document.getElementById("gallery-pin");
    
    // 화면에 갤러리 섹션이 꽉 차면 고정시키고(가로로 스크롤 됨) 다 끝나면 다시 세로 스크롤
    gsap.to(galleryScroll, {
        x: () => -(galleryScroll.scrollWidth - window.innerWidth),
        ease: "none",
        scrollTrigger: {
            trigger: galleryPin,
            pin: true,
            scrub: 1, // 스크롤을 챠라락~ 부드럽게 따라오게 만드는 마법의 수치
            end: () => "+=" + (galleryScroll.scrollWidth - window.innerWidth)
        }
    });

    // 3. RSVP 모달 제어
    const rsvpModal = document.getElementById('rsvpModal');
    function openRSVPModal() { 
        rsvpModal.style.display = 'flex'; 
        setTimeout(() => rsvpModal.style.opacity = 1, 10); 
    }
    function closeRSVPModal() { 
        rsvpModal.style.opacity = 0; 
        setTimeout(() => rsvpModal.style.display = 'none', 400); 
    }

    // 4. BGM 컨트롤러 (재생/일시정지)
    const bgm = document.getElementById('bgm');
    const bgmBtn = document.getElementById('bgm-btn');
    let isPlaying = false;

    function toggleBGM() {
        if (isPlaying) {
            bgm.pause();
            bgmBtn.classList.remove('spin');
            bgmBtn.innerHTML = '<i class="ri-music-2-line"></i>';
        } else {
            bgm.play();
            bgmBtn.classList.add('spin');
            bgmBtn.innerHTML = '<i class="ri-pause-line"></i>';
        }
        isPlaying = !isPlaying;
    }
</script>

</body>
</html>
