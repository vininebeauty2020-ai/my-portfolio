<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nomad Tozzi | Premium Mobile Invitation</title>
    <style>
        body {
            margin: 0; font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            background-color: #111; color: #fff; text-align: center;
        }
        .hero {
            padding: 100px 20px;
        }
        h1 {
            font-size: 2.5rem; font-weight: 300; letter-spacing: 2px;
        }
        p {
            color: #999; line-height: 1.6; margin-bottom: 40px;
        }
        .btn {
            display: inline-block; padding: 15px 30px;
            background-color: #fff; color: #111; text-decoration: none;
            font-weight: bold; border-radius: 30px; transition: 0.3s;
        }
        .btn:hover { background-color: #ccc; }
    </style>

<body>
    <div class="hero">
        <h1>Nomad Tozzi Studio</h1>
        <p>건축적 공간감과 하이엔드 인터랙션을 담은<br>단 하나의 프리미엄 모바일 청첩장</p>
        <!-- 아래 버튼을 누르면 'my-wedding' 폴더 안의 청첩장으로 이동합니다 -->
        <a href="/wedding-invitation/my-wedding/" class="btn">샘플 디자인 보기 (My Wedding)</a>
    </div>

</html>
