<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>2026 지역대회 초대장</title>
  <style>
    /* 여백 없이 이미지가 화면에 꽉 차게 만드는 설정 */
    body {
      margin: 0;
      padding: 0;
      background-color: #ffffff;
      display: flex;
      justify-content: center;
    }
    .img-container {
      width: 100%;
      max-width: 500px; /* 모바일 화면에 맞춤. 너무 큰 PC에서는 500px로 고정 */
    }
    .img-container img {
      width: 100%;
      display: block; /* 이미지 사이의 미세한 틈새 제거 */
    }
  </style>
</head>
<body>

  <div class="img-container">
    <!-- tozz.kr 서버에 올린 이미지 2장의 파일명을 넣어주세요 -->
    <img src="초대장_이미지1.jpg" alt="초대장 첫 번째 장">
    <img src="초대장_이미지2.jpg" alt="초대장 두 번째 장">
  </div>

</body>
</html>
